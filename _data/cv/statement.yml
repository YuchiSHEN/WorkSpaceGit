section:
  number: "01"
  title: Personal statement
paragraphs:
  - >-
    I am applying to join the Young Editorial Board of Architectural Intelligence. My research
    focuses on computational methods for architectural–structural integration, aiming to translate
    rigorous algorithms into tools that can support real design decision-making. I received my PhD
    from Southeast University and completed joint PhD training at ETH Zürich (2019–2020), which
    established long-term collaboration across architecture, engineering, and computation.
  - >-
    On the technical side, I am a principal developer of the Vector-based Graphic Statics (VGS)
    toolchain (in collaboration with UCLeuven), enabling interactive force–form exploration for
    early-stage structural design. I also led the development of the Alternative Directional Residual
    Reduction (ADRR) method and solver for equilibrium computation of discrete network structures,
    and developed BSim, an agent-based simulation platform linking spatial behavior and performance-based
    modeling. These efforts have resulted in peer-reviewed publications in journals such as Automation
    in Construction, Computer-Aided Design, Building Simulation, and Thin-Walled Structures.
  - >-
    I have served as a reviewer for leading journals including Automation in Construction and
    Computer-Aided Design, which has strengthened my ability to assess methodological rigor, novelty,
    and clarity for interdisciplinary audiences. As a Young Editorial Board member, I would contribute
    by providing timely and constructive reviews, supporting special issues around reproducible
    computational workflows and design intelligence, and helping the journal further connect advanced
    research with architectural practice.
