<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkSpaceGit</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1d4ed8);
        color: #f8fafc;
      }
      .card {
        width: min(90vw, 640px);
        padding: 2rem;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.7);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(10px);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        line-height: 1.6;
        color: #cbd5e1;
      }
      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Welcome to WorkSpaceGit</h1>
      <p>This page is now served as a simple static site that can be opened in a browser.</p>
      <p>It is ready to be visited from the local environment and can be expanded with more content later.</p>
    </main>
  </body>
</html>
